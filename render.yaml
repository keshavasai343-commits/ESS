databases:
  - name: employee-portal-db
    databaseName: employee_portal
    user: employee_portal
    plan: free

services:
  - type: web
    name: employee-portal-backend
    runtime: python
    rootDir: employee-portal/backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: employee-portal-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_ORIGINS
        fromService:
          name: employee-portal-frontend
          type: web
          property: url
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: 30
      - key: REFRESH_TOKEN_EXPIRE_DAYS
        value: 7
      - key: UPLOAD_DIR
        value: /tmp/uploads

  - type: web
    name: employee-portal-frontend
    runtime: static
    rootDir: employee-portal/frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    plan: free
    envVars:
      - key: VITE_API_URL
        fromService:
          name: employee-portal-backend
          type: web
          property: url
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
